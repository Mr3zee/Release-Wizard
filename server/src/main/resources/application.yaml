ktor:
  deployment:
    port: 8080
    host: 0.0.0.0
  application:
    modules:
      - com.github.mr3zee.ApplicationKt.module

# All values below can be overridden via system properties (e.g., -Dapp.database.url=...)
# or environment variables at deployment time.
# Env var mapping: DB_URL, DB_USER, DB_PASSWORD, AUTH_SESSION_SIGN_KEY, ENCRYPTION_KEY,
#                  WEBHOOK_BASE_URL
app:
  database:
    url: "$DB_URL:jdbc:postgresql://localhost:5432/release_wizard"
    user: "$DB_USER:postgres"
    password: "$DB_PASSWORD:postgres"
    driver: "org.postgresql.Driver"
  auth:
    sessionSignKey: "$AUTH_SESSION_SIGN_KEY"
  encryption:
    key: "$ENCRYPTION_KEY"
  webhook:
    baseUrl: "$WEBHOOK_BASE_URL:http://localhost:8080"
