ktor:
  deployment:
    port: "$PORT:8080"
    host: "$HOST:0.0.0.0"
  application:
    modules:
      - com.github.mr3zee.ApplicationKt.module

# All values below can be overridden via system properties (e.g., -Dapp.database.url=...)
# or environment variables at deployment time.
# Env var mapping: PORT, HOST, DB_URL, DB_USER, DB_PASSWORD, AUTH_SESSION_SIGN_KEY, ENCRYPTION_KEY,
#                  WEBHOOK_BASE_URL, APP_VERSION, DB_MAX_POOL_SIZE, CORS_ALLOWED_ORIGINS,
#                  BROWSER_SESSION_TTL_SECONDS, DESKTOP_SESSION_TTL_SECONDS,
#                  BROWSER_ABSOLUTE_LIFETIME_SECONDS, DESKTOP_ABSOLUTE_LIFETIME_SECONDS,
#                  PASSWORD_PEPPER, PASSWORD_PEPPER_OLD,
#                  GOOGLE_OAUTH_CLIENT_ID, GOOGLE_OAUTH_CLIENT_SECRET
# JB Cloud Console: map DB0_URL_JDBC → DB_URL, DB0_USERNAME → DB_USER, DB0_PASSWORD → DB_PASSWORD
# via customEnv in Helm additional params (see DEPLOYMENT.md).
app:
  version: "$APP_VERSION:dev"
  database:
    url: "$DB_URL:jdbc:postgresql://localhost:5432/release_wizard"
    user: "$DB_USER:postgres"
    password: "$DB_PASSWORD:postgres"
    driver: "org.postgresql.Driver"
    maxPoolSize: "$DB_MAX_POOL_SIZE:10"
  auth:
    sessionSignKey: "$AUTH_SESSION_SIGN_KEY"
    sessionEncryptKey: "$AUTH_SESSION_ENCRYPT_KEY:"
    browserSessionTtlSeconds: "$BROWSER_SESSION_TTL_SECONDS:2592000"
    desktopSessionTtlSeconds: "$DESKTOP_SESSION_TTL_SECONDS:31536000"
    sessionRefreshThresholdSeconds: "$SESSION_REFRESH_THRESHOLD_SECONDS:60"
    browserAbsoluteLifetimeSeconds: "$BROWSER_ABSOLUTE_LIFETIME_SECONDS:7776000"
    desktopAbsoluteLifetimeSeconds: "$DESKTOP_ABSOLUTE_LIFETIME_SECONDS:63072000"
    secureCookie: "$SECURE_COOKIE:false"
    pepper: "$PASSWORD_PEPPER:"
    pepperOld: "$PASSWORD_PEPPER_OLD:"
    password:
      minLength: "$PASSWORD_MIN_LENGTH:12"
      requireUppercase: "$PASSWORD_REQUIRE_UPPERCASE:true"
      requireDigit: "$PASSWORD_REQUIRE_DIGIT:true"
      requireSpecial: "$PASSWORD_REQUIRE_SPECIAL:false"
    oauth:
      google:
        clientId: "$GOOGLE_OAUTH_CLIENT_ID:"
        clientSecret: "$GOOGLE_OAUTH_CLIENT_SECRET:"
  encryption:
    key: "$ENCRYPTION_KEY"
  webhook:
    baseUrl: "$WEBHOOK_BASE_URL:http://localhost:8080"
  seed:
    adminUsername: "$SEED_ADMIN_USERNAME:"
    adminPassword: "$SEED_ADMIN_PASSWORD:"
  cors:
    allowedOrigins:
      - "$CORS_ALLOWED_ORIGIN_1:"
