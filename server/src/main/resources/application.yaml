ktor:
  deployment:
    port: "$PORT:8080"
    host: "$HOST:0.0.0.0"
  application:
    modules:
      - com.github.mr3zee.ApplicationKt.module

# All values below can be overridden via system properties (e.g., -Dapp.database.url=...)
# or environment variables at deployment time.
# Env var mapping: PORT, HOST, DB_URL, DB_USER, DB_PASSWORD, AUTH_SESSION_SIGN_KEY, ENCRYPTION_KEY,
#                  WEBHOOK_BASE_URL, APP_VERSION, DB_MAX_POOL_SIZE, CORS_ALLOWED_ORIGINS
app:
  version: "$APP_VERSION:dev"
  database:
    url: "$DB_URL:jdbc:postgresql://localhost:5432/release_wizard"
    user: "$DB_USER:postgres"
    password: "$DB_PASSWORD:postgres"
    driver: "org.postgresql.Driver"
    maxPoolSize: "$DB_MAX_POOL_SIZE:10"
  auth:
    sessionSignKey: "$AUTH_SESSION_SIGN_KEY"
    sessionEncryptKey: "$AUTH_SESSION_ENCRYPT_KEY"
    sessionTtlSeconds: "$SESSION_TTL_SECONDS:86400"
    sessionRefreshThresholdSeconds: "$SESSION_REFRESH_THRESHOLD_SECONDS:60"
    secureCookie: "$SECURE_COOKIE:true"
    password:
      minLength: "$PASSWORD_MIN_LENGTH:12"
      requireUppercase: "$PASSWORD_REQUIRE_UPPERCASE:true"
      requireDigit: "$PASSWORD_REQUIRE_DIGIT:true"
      requireSpecial: "$PASSWORD_REQUIRE_SPECIAL:false"
  encryption:
    key: "$ENCRYPTION_KEY"
  webhook:
    baseUrl: "$WEBHOOK_BASE_URL:http://localhost:8080"
  cors:
    allowedOrigins:
      - "$CORS_ALLOWED_ORIGIN_1:"
